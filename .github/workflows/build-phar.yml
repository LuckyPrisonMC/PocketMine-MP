name: Build PocketMine-MP.phar

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build server phar
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download pmmp PHP binary
        run: |
          curl --location --fail --progress-bar \
            "https://github.com/pmmp/PHP-Binaries/releases/download/pm5-latest/PHP-8.2-Linux-x86_64-PM5.tar.gz" \
            -o php-pm5.tar.gz
          tar -xzf php-pm5.tar.gz
          ./bin/php7/bin/php --version

      - name: Build via composer make-server
        run: ./bin/php7/bin/php "$(which composer)" make-server

      - name: Upload phar sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketMine-MP-phar
          path: PocketMine-MP.phar
          if-no-files-found: error
